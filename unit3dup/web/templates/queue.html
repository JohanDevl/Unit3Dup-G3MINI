{% extends "base.html" %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
        <h2 style="margin-bottom:0.25rem">Upload Queue</h2>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin:0">{{ items | length }} item(s) in the upload pipeline</p>
    </div>
</div>

<div class="card">
    <div hx-get="/partials/queue-list" hx-trigger="every 5s" hx-swap="innerHTML" id="queue-container">
        {% include "partials/queue_rows.html" %}
    </div>
</div>

<script>
function cancelQueueItem(id, btn) {
    btn.disabled = true;
    fetch(`/api/v1/items/${id}/cancel`, {
        method: "POST",
        headers: {"Content-Type": "application/json"}
    }).then(r => r.json()).then(data => {
        if (data.success) {
            htmx.trigger("#queue-container", "htmx:load");
            document.getElementById("queue-container").dispatchEvent(new Event("refresh"));
            location.reload();
        } else {
            btn.disabled = false;
            alert(data.detail || data.message);
        }
    }).catch(err => {
        btn.disabled = false;
        alert('Cancel failed: ' + err);
    });
}
</script>

{% endblock %}
