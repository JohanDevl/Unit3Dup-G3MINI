{% extends "base.html" %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
        <h2 style="margin-bottom:0.25rem">Pending Items</h2>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin:0">{{ items | length }} item(s) waiting for review</p>
    </div>
</div>

<div class="card" id="pending-card">
    <div class="table-toolbar">
        <div class="search-wrapper">
            <i data-lucide="search"></i>
            <input type="text" class="search-input" placeholder="Search pending items..."
                   oninput="tableSearch(this, 'pending-table')">
        </div>
        <select class="filter-select" data-col="3" onchange="tableFilter(this, 'pending-table', 3)">
            <option value="">All categories</option>
            <option value="movie">Movie</option>
            <option value="tv">TV</option>
            <option value="animation">Animation</option>
            <option value="game">Game</option>
            <option value="documentary">Documentary</option>
        </select>
        <div class="multi-filter" data-table="pending-table" data-col="5" data-filter-name="resolution" data-auto-populate="true">
            <button type="button" class="multi-filter-trigger">Resolution <span class="multi-filter-count"></span> <span class="multi-filter-arrow">&#9662;</span></button>
            <div class="multi-filter-dropdown"></div>
        </div>
        <div class="multi-filter" data-table="pending-table" data-col="4" data-filter-name="sourcetag" data-auto-populate="true">
            <button type="button" class="multi-filter-trigger">Source Tag <span class="multi-filter-count"></span> <span class="multi-filter-arrow">&#9662;</span></button>
            <div class="multi-filter-dropdown"></div>
        </div>
        <div class="multi-filter" data-table="pending-table" data-col="6" data-filter-name="validation" data-auto-populate="true">
            <button type="button" class="multi-filter-trigger">Validation <span class="multi-filter-count"></span> <span class="multi-filter-arrow">&#9662;</span></button>
            <div class="multi-filter-dropdown"></div>
        </div>
        <div class="mobile-sort">
            <select class="filter-select" onchange="mobileSortFromDropdown(this, 'pending-table')">
                <option value="">Sort by...</option>
                <option value="0:alpha">Source (A-Z)</option>
                <option value="0:alpha:desc">Source (Z-A)</option>
                <option value="1:alpha">Release Name (A-Z)</option>
                <option value="1:alpha:desc">Release Name (Z-A)</option>
                <option value="2:num">Size (Low-High)</option>
                <option value="2:num:desc">Size (High-Low)</option>
                <option value="3:alpha">Category (A-Z)</option>
                <option value="5:alpha">Resolution</option>
                <option value="8:date">Discovered (Oldest)</option>
                <option value="8:date:desc">Discovered (Newest)</option>
            </select>
        </div>
    </div>

    <div hx-get="/partials/pending-list" hx-trigger="every 10s" hx-swap="innerHTML" id="pending-container"
         hx-on::after-swap="reapplySort('pending-table'); initPagination('pending-table', 'pending-pagination', 25); refreshMultiFilterOptions('pending-table'); reapplyFilters('pending-table')">
        {% include "partials/pending_rows.html" %}
    </div>
    <div id="pending-pagination"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        initMultiSelectDropdowns();
        initPagination('pending-table', 'pending-pagination', 25);
    });
</script>

{% endblock %}
