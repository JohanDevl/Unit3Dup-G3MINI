{% extends "base.html" %}
{% block content %}

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
    <div>
        <h2 style="margin-bottom:0.25rem">Pending Items</h2>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin:0">{{ items | length }} item(s) waiting for review</p>
    </div>
</div>

<div class="card" id="pending-card">
    <div class="table-toolbar">
        <div class="search-wrapper">
            <i data-lucide="search"></i>
            <input type="text" class="search-input" placeholder="Search pending items..."
                   oninput="tableSearch(this, 'pending-table')">
        </div>
        <select class="filter-select" onchange="tableFilter(this, 'pending-table', 3)">
            <option value="">All categories</option>
            <option value="movie">Movie</option>
            <option value="tv">TV</option>
            <option value="animation">Animation</option>
            <option value="game">Game</option>
            <option value="documentary">Documentary</option>
        </select>
    </div>

    <div hx-get="/partials/pending-list" hx-trigger="every 10s" hx-swap="innerHTML" id="pending-container"
         hx-on::after-swap="initPagination('pending-table', 'pending-pagination', 25)">
        {% include "partials/pending_rows.html" %}
    </div>
    <div id="pending-pagination"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => initPagination('pending-table', 'pending-pagination', 25));
</script>

{% endblock %}
