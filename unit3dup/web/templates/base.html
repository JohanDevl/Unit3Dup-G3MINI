<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title | default("Dashboard") }} - Unit3Dup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <header class="container">
        <nav>
            <ul>
                <li><strong>Unit3Dup</strong></li>
            </ul>
            <ul>
                <li><a href="/" {% if page_title == "Dashboard" %}aria-current="page"{% endif %}>Dashboard</a></li>
                <li><a href="/pending" {% if page_title == "Pending" %}aria-current="page"{% endif %}>Pending</a></li>
                <li><a href="/history" {% if page_title == "History" %}aria-current="page"{% endif %}>History</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container">
        <small>Unit3Dup Web Dashboard</small>
    </footer>
</body>
</html>
